# =====================================================
# Cantinho System — Stack PostgreSQL self-hosted
# Supabase-compatible: PostgREST expõe o Postgres como API REST
# =====================================================
# Uso: docker compose up -d
# Acesse a API em http://<IP_DO_SERVIDOR>:8000
# Acesse o Studio em http://<IP_DO_SERVIDOR>:3000

version: "3.8"

services:
  # PostgreSQL 16 — banco de dados principal
  postgres:
    image: postgres:16-alpine
    container_name: cantinho-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cantinho}
      POSTGRES_USER: ${POSTGRES_USER:-cantinho}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cantinho}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PostgREST — expõe o Postgres como API REST (mesmo formato do Supabase)
  postgrest:
    image: postgrest/postgrest:v12.2.0
    container_name: cantinho-postgrest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER:-cantinho}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cantinho}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_OPENAPI_SERVER_PROXY_URI: http://${SERVER_HOST:-localhost}:8000
    ports:
      - "8000:3000"

  # Studio — dashboard web pra ver/editar tabelas (estilo Supabase Dashboard)
  studio:
    image: dpage/pgadmin4:latest
    container_name: cantinho-studio
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: ${ADMIN_EMAIL:-admin@cantinho.local}
      PGADMIN_DEFAULT_PASSWORD: ${ADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "3000:80"

  # Backup automático diário do banco
  backup:
    image: postgres:16-alpine
    container_name: cantinho-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
    entrypoint: |
      sh -c 'while true; do
        DATE=$$(date +%Y-%m-%d_%H-%M-%S)
        pg_dump -h postgres -U ${POSTGRES_USER:-cantinho} ${POSTGRES_DB:-cantinho} > /backups/backup_$$DATE.sql
        echo "Backup criado: /backups/backup_$$DATE.sql"
        # Mantém apenas os últimos 14 backups
        ls -1t /backups/backup_*.sql | tail -n +15 | xargs -r rm
        sleep 86400
      done'

volumes:
  postgres_data:
  pgadmin_data:

networks:
  default:
    name: cantinho-network
