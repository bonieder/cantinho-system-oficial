# =====================================================
# Cantinho System — Stack VPS completa
# PostgreSQL + PostgREST + pgAdmin + Caddy (HTTPS) + Evolution (WhatsApp)
# =====================================================

version: "3.8"

services:
  # PostgreSQL 16 — banco de dados principal
  postgres:
    image: postgres:16-alpine
    container_name: cantinho-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cantinho}
      POSTGRES_USER: ${POSTGRES_USER:-cantinho}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cantinho}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PostgREST — API REST sobre o Postgres
  postgrest:
    image: postgrest/postgrest:v12.2.0
    container_name: cantinho-postgrest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER:-cantinho}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cantinho}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
    expose:
      - "3000"

  # pgAdmin — dashboard web do banco
  studio:
    image: dpage/pgadmin4:latest
    container_name: cantinho-studio
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: ${ADMIN_EMAIL:-admin@cantinho.local}
      PGADMIN_DEFAULT_PASSWORD: ${ADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    expose:
      - "80"

  # Evolution API — WhatsApp self-hosted (alternativa ao Z-API, R$ 0/mês)
  # Comente esse bloco inteiro se for usar Z-API
  evolution:
    image: atendai/evolution-api:v2.1.1
    container_name: cantinho-evolution
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER:-cantinho}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cantinho}
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "false"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"
      CONFIG_SESSION_PHONE_CLIENT: "Cantinho do Boni"
      QRCODE_LIMIT: 30
      WEBHOOK_GLOBAL_ENABLED: "false"
      LOG_LEVEL: ERROR
    volumes:
      - evolution_data:/evolution/instances
    expose:
      - "8080"

  # Caddy — proxy reverso com HTTPS automático (Let's Encrypt)
  caddy:
    image: caddy:2-alpine
    container_name: cantinho-caddy
    restart: unless-stopped
    depends_on:
      - postgrest
      - studio
      - evolution
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}

  # Backup automático diário do banco (mantém 14 dias)
  backup:
    image: postgres:16-alpine
    container_name: cantinho-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
    entrypoint: |
      sh -c 'while true; do
        DATE=$$(date +%Y-%m-%d_%H-%M-%S)
        pg_dump -h postgres -U ${POSTGRES_USER:-cantinho} ${POSTGRES_DB:-cantinho} > /backups/backup_$$DATE.sql 2>/dev/null
        gzip -f /backups/backup_$$DATE.sql
        echo "[backup] $$DATE.sql.gz criado"
        ls -1t /backups/backup_*.sql.gz | tail -n +15 | xargs -r rm
        sleep 86400
      done'

volumes:
  postgres_data:
  pgadmin_data:
  evolution_data:
  caddy_data:
  caddy_config:

networks:
  default:
    name: cantinho-network
